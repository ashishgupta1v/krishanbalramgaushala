server {
    server_name krishanbalramgaushala.com www.krishanbalramgaushala.com;
    root /var/www/krishanbalramgaushala/public;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    index index.php;
    charset utf-8;

    # sw.js and manifest MUST NOT be cached by browser
    location ~* ^/(sw\.js|manifest\.json)$ {
        expires -1;
        add_header Cache-Control no-store;
        try_files $uri =404;
        access_log off;
    }

    # Vite hashed build assets — cache 1 year
    location ~* ^/build/assets/ {
        expires 1y;
        add_header Cache-Control public;
        access_log off;
    }

    # Static images/fonts — cache 30 days
    location ~* \.(png|jpg|jpeg|gif|webp|ico|svg|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control public;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:19000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/krishanbalramgaushala.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/krishanbalramgaushala.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name krishanbalramgaushala.com www.krishanbalramgaushala.com;
    return 301 https://$host$request_uri;
}
